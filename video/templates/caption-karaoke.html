<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_brand.css">
<style>
  /* Transparent stage — this template is designed for --transparent overlay
     renders on top of footage. Solid bg only if ?bg=1. */
  html, body { background: transparent; }
  .stage { align-items: flex-end; justify-content: center; }
  .pill-zone {
    /* Sits in the IG-safe band: above bottom 420px, below face line. */
    margin-bottom: 480px;
    padding: 0 60px;
    text-align: center;
  }
  .pill {
    display: inline-block;
    background: rgba(10, 8, 8, 0.82);
    border-radius: 26px;
    padding: 26px 42px;
    font-size: 54px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--cream);
    opacity: 0;
  }
  .w { display: inline-block; white-space: pre; }
  .w.hot { color: var(--coral); }
</style>
</head>
<body>
<div class="stage">
  <div class="pill-zone"><div class="pill" id="pill"></div></div>
</div>
<script src="../vendor/gsap.min.js"></script>
<script>
  const q = new URLSearchParams(location.search);
  // words: comma-separated. times: comma-separated word start times (s), from
  // Whisper word timestamps. If omitted, words spread evenly across ?dur.
  const words = (q.get('words') || 'this,is,how,you,edit,without,editing').split(',');
  const dur = parseFloat(q.get('dur') || '2.5');
  const timesRaw = q.get('times');
  const times = timesRaw ? timesRaw.split(',').map(Number) : words.map((_, i) => (i * dur) / words.length);
  if (q.get('bg') === '1') document.body.style.background = '#0A0808';

  const pill = document.getElementById('pill');
  const els = words.map((w, i) => {
    const s = document.createElement('span');
    s.className = 'w';
    s.textContent = w + (i < words.length - 1 ? ' ' : '');
    pill.appendChild(s);
    return s;
  });

  const tl = gsap.timeline();
  tl.fromTo('#pill', { opacity: 0, y: 40, scale: 0.92 }, { opacity: 1, y: 0, scale: 1, duration: 0.3, ease: 'back.out(1.8)' }, 0);
  els.forEach((el, i) => {
    const t = Math.max(0.05, times[i]);
    // Karaoke highlight: word turns coral + pops exactly at its spoken time.
    // Color as a real tween (not a class toggle) so it's correct at any seek t.
    tl.fromTo(el, { scale: 1 }, { scale: 1.12, duration: 0.12, ease: 'power2.out', yoyo: true, repeat: 1 }, t);
    tl.fromTo(el, { color: '#EDD9BC' }, { color: '#D97757', duration: 0.06, ease: 'none' }, t);
  });
</script>
</body>
</html>
