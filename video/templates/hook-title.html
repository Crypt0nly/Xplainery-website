<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_brand.css">
<style>
  .wrap { text-align: center; padding: 0 70px; z-index: 1; }
  .title {
    font-weight: 800;
    font-size: 108px;
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--cream);
  }
  .title .word { display: inline-block; white-space: pre; will-change: transform, opacity, filter; }
  .title .accent { color: var(--coral); }
  .kicker {
    font-family: var(--mono);
    font-size: 30px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 42px;
    opacity: 0;
  }
  .rule { width: 120px; height: 5px; background: var(--coral); border-radius: 3px; margin: 52px auto 0; transform: scaleX(0); }
</style>
</head>
<body>
<div class="stage">
  <img class="topo-bg" src="../vendor/topo.svg">
  <div class="wrap">
    <div class="kicker" id="kicker"></div>
    <h1 class="title" id="title"></h1>
    <div class="rule" id="rule"></div>
  </div>
</div>
<script src="../vendor/gsap.min.js"></script>
<script>
  const q = new URLSearchParams(location.search);
  const text = q.get('text') || 'Stop paying for video editors';
  const kicker = q.get('kicker') || '';
  const accents = (q.get('accent') || '').split(',').filter(s => s !== '').map(Number);

  const titleEl = document.getElementById('title');
  text.split(' ').forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'word' + (accents.includes(i) ? ' accent' : '');
    s.textContent = w + (i < text.split(' ').length - 1 ? ' ' : '');
    titleEl.appendChild(s);
  });
  const kickerEl = document.getElementById('kicker');
  if (kicker) kickerEl.textContent = kicker; else kickerEl.style.display = 'none';

  const tl = gsap.timeline();
  if (kicker) tl.fromTo('#kicker', { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 0.05);
  tl.fromTo('.title .word',
    { opacity: 0, y: 90, scale: 1.35, filter: 'blur(14px)' },
    { opacity: 1, y: 0, scale: 1, filter: 'blur(0px)', duration: 0.55, ease: 'power4.out', stagger: 0.09 },
    kicker ? 0.3 : 0.1);
  tl.fromTo('#rule', { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: 'power3.inOut' }, '-=0.25');
  // Idle breathing on the accent — direct gsap.to(), not on tl, so it never drifts the playhead.
  gsap.to('.title .accent', { scale: 1.04, duration: 1.1, ease: 'sine.inOut', repeat: -1, yoyo: true, delay: 1.4 });
</script>
</body>
</html>
