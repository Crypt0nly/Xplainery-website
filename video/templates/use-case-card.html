<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_brand.css">
<style>
  .wrap { width: 880px; z-index: 1; padding: 0 40px; }
  .idx {
    font-family: var(--mono);
    font-size: 30px;
    letter-spacing: 0.25em;
    color: rgba(237,217,188,0.4);
    margin-bottom: 44px;
    opacity: 0;
  }
  .chip {
    width: 150px; height: 150px;
    border-radius: 38px;
    background: rgba(217,119,87,0.12);
    border: 2px solid var(--coral);
    display: flex; align-items: center; justify-content: center;
    color: var(--coral);
    margin-bottom: 48px;
    opacity: 0;
  }
  .chip svg { width: 76px; height: 76px; }
  .name {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 34px;
    opacity: 0;
  }
  .pain {
    font-size: 42px;
    font-weight: 400;
    line-height: 1.4;
    color: rgba(237,217,188,0.55);
    margin-bottom: 46px;
    opacity: 0;
  }
  .win {
    display: flex; align-items: flex-start; gap: 22px;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--green);
    opacity: 0;
  }
  .win .arrow { flex: none; margin-top: 2px; }
  .bar {
    position: absolute;
    left: 100px; right: 100px;
    bottom: 460px; /* inside IG-safe band */
    height: 6px;
    background: rgba(237,217,188,0.12);
    border-radius: 3px;
    z-index: 1;
  }
  .bar .done {
    height: 100%;
    background: var(--coral);
    border-radius: 3px;
    transform-origin: left center;
    transform: scaleX(0);
  }
</style>
</head>
<body>
<div class="stage">
  <img class="topo-bg" src="../vendor/topo.svg">
  <div class="wrap">
    <div class="idx" id="idx"></div>
    <div class="chip" id="chip"></div>
    <div class="name" id="name"></div>
    <div class="pain" id="pain"></div>
    <div class="win" id="win"><span class="arrow">→</span><span id="wintext"></span></div>
  </div>
  <div class="bar"><div class="done" id="done"></div></div>
</div>
<script src="../vendor/gsap.min.js"></script>
<script>
  const ICONS = {
    email: '<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 7l10 6 10-6"/>',
    content: '<path d="M3 11l18-6v14L3 14v-3z"/><path d="M6 15l1.2 4.2a1 1 0 0 0 1 .8H10"/>',
    sales: '<rect x="2" y="7" width="20" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M2 13h20"/>',
    support: '<path d="M4 18v-5a8 8 0 0 1 16 0v5"/><rect x="3" y="14" width="4.5" height="7" rx="2"/><rect x="16.5" y="14" width="4.5" height="7" rx="2"/>',
    research: '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
    admin: '<rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 11h6M9 15h4"/>',
  };
  const q = new URLSearchParams(location.search);
  const icon = q.get('icon') || 'email';
  document.getElementById('idx').textContent = `${q.get('idx') || '01'} / ${q.get('total') || '06'}`;
  document.getElementById('chip').innerHTML =
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[icon] || ICONS.email}</svg>`;
  document.getElementById('name').textContent = q.get('name') || 'Email & outreach';
  document.getElementById('pain').textContent = q.get('pain') || 'Newsletters and replies quietly eat hours every week.';
  document.getElementById('wintext').textContent = q.get('win') || 'Drafted in minutes, in your tone.';
  const progress = parseFloat(q.get('progress') || '0.166');

  const tl = gsap.timeline();
  tl.fromTo('#chip', { opacity: 0, scale: 0.55, rotate: -8 },
    { opacity: 1, scale: 1, rotate: 0, duration: 0.5, ease: 'back.out(1.7)' }, 0.05);
  tl.fromTo('#idx', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0.15);
  tl.fromTo('#name', { opacity: 0, y: 55 }, { opacity: 1, y: 0, duration: 0.55, ease: 'power4.out' }, 0.3);
  tl.fromTo('#pain', { opacity: 0, y: 35 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 0.65);
  tl.fromTo('#win', { opacity: 0, y: 40, scale: 0.96 },
    { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: 'back.out(1.5)' }, 1.45);
  tl.fromTo('#done', { scaleX: Math.max(0, progress - 1/6) }, { scaleX: progress, duration: 0.6, ease: 'power2.inOut' }, 0.4);
</script>
</body>
</html>
